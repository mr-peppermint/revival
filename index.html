<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Scroll Container -->
    <div class="scroll-container">
        <section class="section intro">
            <h1>The Reflection</h1>
        </section>

        <!-- Animation Wrapper: Elements here will zoom/fade to simulate "depths" -->
        <div class="depth-wrapper">
            <div class="core-element element-1">Reality</div>
            <div class="core-element element-2">Effort</div>
            <div class="core-element element-3">Accountability</div>
            <div class="core-element element-4">Remorse</div>
        </div>

        <section class="section end-trigger">
            <!-- Space for final animation end -->
        </section>
    </div>

    <!-- Dialogue Box -->
    <div id="dialogueBox" class="hidden">
        <div class="dialogue-content">
            <p>"Will it stay this way angel? I wish we could be as we were few days ago."</p>
            <div class="options">
                <button onclick="sendResponse('Yes, Sure')">Yes sure</button>
                <button onclick="sendResponse('Not Gonna Happen')">Not gonna happen</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
