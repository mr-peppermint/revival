<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sea Of Time</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="sot.mp3" type="audio/mpeg">
    </audio>

    <canvas id="bgCanvas"></canvas>
    <div id="heartSphere"></div>

    <div class="side-decorations">
        <div class="echo left">Vulnerability</div>
        <div class="echo right">Promises</div>
        <div class="echo left">Fragments</div>
        <div class="echo right">Distance</div>
        <div class="echo left">Waiting</div>
        <div class="echo right">Hope</div>
    </div>

    <div id="eyesBackground"></div>

    <div class="scroll-container">
        <section class="section intro">
            <h1 class="main-title">The Sea Of Time</h1>
        </section>

        <div class="depth-wrapper">
            <div class="core-element element-1">Reality</div>
            <div class="core-element element-2">Effort</div>
            <div class="core-element element-3">Ghosting</div>
            <div class="core-element element-4">Remorse</div>
            <div class="core-element element-5">Love</div>
            <div class="core-element element-6">Care</div>
            <div class="core-element element-7">Silence</div>
            <div class="core-element element-8">Stillness</div>
            <div class="core-element element-9">why?</div>
        </div>

        <section class="section end-trigger"></section>
    </div>

    <div id="dialogueBox" class="hidden">
        <div class="dialogue-content">
            <div id="dialogueText">
                <p>"Will it stay this way Angel? I wish we could be as we were few days ago."</p>
                <div class="options">
                    <button onclick="sendResponse('Give A Chance', event)">Yes sure</button>
                    <button onclick="sendResponse('Become Stranger', event)">Not gonna happen</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
