<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reflection</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Dynamic Heart Ocean Canvas -->
    <canvas id="bgCanvas"></canvas>
    
    <!-- Final Image Holder (Her Eyes) -->
    <div id="eyesBackground"></div>

    <div class="scroll-container">
        <section class="section intro">
            <h1 class="main-title">The Reflection</h1>
        </section>

        <!-- Depth Elements -->
        <div class="depth-wrapper">
            <div class="core-element element-1">Reality</div>
            <div class="core-element element-2">Effort</div>
            <div class="core-element element-3">Accountability</div>
            <div class="core-element element-4">Remorse</div>
        </div>

        <!-- Scroll trigger section at the absolute bottom -->
        <section class="section end-trigger"></section>
    </div>

    <!-- Final Dialogue Box -->
    <div id="dialogueBox" class="hidden">
        <div class="dialogue-content">
            <p>"Will it stay this way angel? I wish we could be as we were few days ago."</p>
            <div class="options">
                <button onclick="sendResponse('Yes, Sure')">Yes sure</button>
                <button onclick="sendResponse('Not Gonna Happen')">Not gonna happen</button>
            </div>
        </div>
    </div>

    <!-- Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
